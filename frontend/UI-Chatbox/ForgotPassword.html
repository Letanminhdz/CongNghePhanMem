<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&family=Fira+Code:wght@300..700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
      }
      :root { --card-foreground: #0F172A;
        --tertiary: #38bdf8;
        --background: #F8FAFC;
        --ring: #2563EB;
        --border: #E2E8F0;
        --radius: 0.75rem;
        --font-heading: Inter, sans-serif;
        --secondary-foreground: #0F172A;
        --accent: #F1F5F9;
        --destructive: #EF4444;
        --muted: #F1F5F9;
        --secondary: #F1F5F9;
        --primary: #2563EB;
        --card: #FFFFFF;
        --primary-foreground: #FFFFFF;
        --input: #E2E8F0;
        --font-sans: Inter, sans-serif;
        --foreground: #0F172A;
        --muted-foreground: #64748b; }
    </style>
  </head>
  <body>
<div class="min-h-screen w-full bg-background flex flex-col relative items-center justify-center p-6">
  <div class="w-full max-w-md bg-card rounded-2xl shadow-sm p-8 border border-border">
    <div class="flex items-center justify-center mb-6">
      <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
        <iconify-icon icon="lucide:key" class="text-2xl"></iconify-icon>
      </div>
    </div>
    
    <div class="text-center mb-8">
      <h2 class="text-2xl font-heading font-bold text-foreground">Reset Password</h2>
      <p class="text-muted-foreground mt-2 text-sm">Enter the email address associated with your account and we'll send you a link to reset your password.</p>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-foreground mb-1.5 ml-4">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-muted-foreground">
             <iconify-icon icon="lucide:mail"></iconify-icon>
          </div>
          <input type="email" class="w-full pl-11 pr-4 py-3 bg-background border border-input rounded-full text-foreground focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" placeholder="name@example.com">
        </div>
      </div>

      <div>
        <button type="button" class="w-full py-3 px-4 bg-primary hover:bg-primary/90 text-primary-foreground font-medium rounded-full shadow-sm transition-colors">
          Send Reset Link
        </button>
      </div>
    </form>
    
    <div class="mt-8 text-center">
      <a href="#" class="inline-flex items-center text-sm text-muted-foreground hover:text-primary transition-colors font-medium">
        <iconify-icon icon="lucide:arrow-left" class="mr-2 text-lg"></iconify-icon>
        Back to login
      </a>
    </div>
  </div>
</div>
</body></html>
